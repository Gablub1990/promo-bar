<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversion Bar - Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div>
                <h1>Conversion Bar</h1>
                <p>Configurá tu banner en menos de 30 segundos</p>
            </div>
        </header>

        <main class="layout">
            <section class="panel">
                <div class="card">
                    <h2>Tipo de banner</h2>
                    <div class="mode-selector">
                        <label class="radio-card">
                            <input type="radio" name="bannerType" value="announcement" checked>
                            <span>Anuncio</span>
                        </label>

                        <label class="radio-card">
                            <input type="radio" name="bannerType" value="shipping">
                            <span>Envío gratis</span>
                        </label>

                        <label class="radio-card">
                            <input type="radio" name="bannerType" value="countdown">
                            <span>Countdown</span>
                        </label>
                    </div>
                </div>

                <div class="card">
                    <h2>Contenido</h2>

                    <div id="announcement-fields" class="mode-fields">
                        <label>Texto</label>
                        <input type="text" id="announcementText" value="20% OFF en toda la tienda">

                        <label>Link</label>
                        <input type="text" id="announcementLink" value="https://mitienda.com/ofertas">

                        <label>Texto del botón</label>
                        <input type="text" id="announcementButtonText" value="Comprar ahora">
                    </div>

                    <div id="shipping-fields" class="mode-fields hidden">
                        <label>Monto objetivo</label>
                        <input type="number" id="shippingGoal" value="50000">

                        <label>Monto actual del carrito</label>
                        <input type="number" id="shippingCurrent" value="35000">

                        <label>Mensaje</label>
                        <input type="text" id="shippingMessage" value="Te faltan {amount} para envío gratis">
                    </div>

                    <div id="countdown-fields" class="mode-fields hidden">
                        <label>Mensaje</label>
                        <input type="text" id="countdownMessage" value="Oferta termina en">

                        <label>Fecha de finalización</label>
                        <input type="datetime-local" id="countdownEnd">
                    </div>
                </div>

                <div class="card">
                    <h2>Diseño</h2>

                    <div class="color-row">
                        <div>
                            <label>Color de fondo</label>
                            <input type="color" id="bgColor" value="#111111">
                        </div>

                        <div>
                            <label>Color del texto</label>
                            <input type="color" id="textColor" value="#ffffff">
                        </div>

                        <div>
                            <label>Color del botón</label>
                            <input type="color" id="buttonColor" value="#00e5ff">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Comportamiento</h2>

                    <div class="checkbox-group">
                        <label><input type="checkbox" id="showBanner" checked> Mostrar banner</label>
                        <label><input type="checkbox" id="showClose" checked> Mostrar botón cerrar</label>
                        <label><input type="checkbox" id="showOnMobile" checked> Mostrar en mobile</label>
                    </div>
                </div>

                <div class="actions">
                    <button id="saveBtn">Guardar y activar</button>
                    <span id="saveStatus"></span>
                </div>
            </section>

            <aside class="preview-panel">
                <div class="card">
                    <h2>Preview</h2>
                    <div class="preview-wrapper">
                        <div id="previewBar" class="preview-bar">
                            <span id="previewText">20% OFF en toda la tienda</span>
                            <a id="previewLink" href="#" target="_blank">Comprar ahora</a>
                            <button id="previewClose">✖</button>
                        </div>

                        <div class="preview-store">
                            <h3>Mi tienda</h3>
                            <p>Vista previa del sitio con el banner activo.</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Código instalable</h2>
<pre id="configOutput"></pre>
<button id="copyCodeBtn" type="button">Copiar código</button>
                </div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
